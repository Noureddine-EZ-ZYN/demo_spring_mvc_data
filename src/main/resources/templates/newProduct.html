<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
    <title>Add New Product</title>
</head>
<body>
<div class="container p-4">

    <h3>Add New Product</h3>

    <form th:action="@{/save}" th:object="${product}" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Product Name" required>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" th:field="*{prix}" class="form-control" placeholder="Product Price" required>
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" th:field="*{quantite}" class="form-control" placeholder="Product Quantity" required>
        </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
        <a th:href="@{/index}" class="btn btn-secondary">Cancel</a>

    </form>

</div>
</body>
</html>
